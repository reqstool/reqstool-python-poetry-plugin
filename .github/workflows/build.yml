name: Build PyPI
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  linting:
    name: Reuse linting job
    uses: ./.github/workflows/lint.yml

  build:
    needs: linting
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 #full history
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
      - name: Install poetry-dynamic-versioning
        run: poetry self add "poetry-dynamic-versioning[plugin]"
      - name: Install dependencies
        run: poetry install --with dev
      - name: Build wheel (used by e2e tests)
        run: poetry build --format wheel
      - name: Install plugin into Poetry (activates it for e2e tests)
        run: poetry self add dist/reqstool_python_poetry_plugin-*.whl
      - name: Run tests
        run: poetry run pytest --junitxml=build/junit.xml --cov --cov-report=xml:build/coverage.xml
      - name: Build project
        run: poetry build
      # Upload artifacts for later use
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
