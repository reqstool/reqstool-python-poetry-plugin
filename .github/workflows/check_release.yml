name: Check Release
on:
  workflow_call:

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        run: |
          if ! echo "${{ github.ref }}" | grep -qE '^refs/tags/[0-9]+(\.[0-9]+)*(a[0-9]+|b[0-9]+|rc[0-9]+)?(\.post[0-9]+)?(\.dev[0-9]+)?$'; then
            echo "Tag must be a PEP 440 version like 1.2.3, 1.2.3a1, 1.2.3b2, 1.2.3rc1, 1.2.3.post1 (no v prefix)"
            exit 1
          fi
      - name: Check branch
        run: |
          branch="${{ github.event.release.target_commitish }}"
          if [[ "$branch" != "main" && "$branch" != hotfix/* && "$branch" != release/* ]]; then
            echo "Release must target main, hotfix/*, or release/* branch (got: $branch)"
            exit 1
          fi